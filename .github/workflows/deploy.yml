name: "CD: Deploy (prod)"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  read-manifest:
    runs-on: ubuntu-latest
    outputs:
      prod_app_tag: ${{ steps.parse.outputs.prod_app_tag }}
      prod_web_tag: ${{ steps.parse.outputs.prod_web_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse deploy manifest
        id: parse
        run: |
          echo "prod_app_tag=$(yq '.prod.app_image_tag' deploy.yaml)" >> $GITHUB_OUTPUT
          echo "prod_web_tag=$(yq '.prod.web_image_tag' deploy.yaml)" >> $GITHUB_OUTPUT

  deploy-prod-backend:
    needs: read-manifest
    runs-on: ubuntu-latest
    environment: prod
    concurrency:
      group: deploy-prod-backend
      cancel-in-progress: false
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition nusiss-team-1-voc-prod-listing-service \
            --query taskDefinition \
            > task-def.json

      - name: Update image in task definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        id: render
        with:
          task-definition: task-def.json
          container-name: app
          image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-1.amazonaws.com/nusiss-team-1-voc/tcgm-listing:${{ needs.read-manifest.outputs.prod_app_tag }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: nusiss-team-1-voc-prod-listing-service
          cluster: nusiss-team-1-voc-prod-cluster
          wait-for-service-stability: true

  deploy-prod-frontend:
    needs: read-manifest
    runs-on: ubuntu-latest
    environment: prod
    concurrency:
      group: deploy-prod-frontend
      cancel-in-progress: false
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition nusiss-team-1-voc-prod-web \
            --query taskDefinition \
            > task-def.json

      - name: Update image in task definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        id: render
        with:
          task-definition: task-def.json
          container-name: web
          image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-1.amazonaws.com/nusiss-team-1-voc/tcgm-web:${{ needs.read-manifest.outputs.prod_web_tag }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: nusiss-team-1-voc-prod-web-service
          cluster: nusiss-team-1-voc-prod-cluster
          wait-for-service-stability: true
