name: "CI: Frontend (prod)"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "frontend/**"

concurrency:
  group: web-ci-prod-${{ github.ref }}
  cancel-in-progress: true

jobs:
  read-manifest:
    runs-on: ubuntu-latest
    outputs:
      listing_api: ${{ steps.parse.outputs.listing_api }}
      messaging_api: ${{ steps.parse.outputs.messaging_api }}
    steps:
      - uses: actions/checkout@v4
      - name: Parse deploy manifest
        id: parse
        run: |
          echo "listing_api=$(yq '.prod.listing_api' deploy.yaml)" >> $GITHUB_OUTPUT
          echo "messaging_api=$(yq '.prod.messaging_api' deploy.yaml)" >> $GITHUB_OUTPUT

  build:
    needs: read-manifest
    uses: ./.github/workflows/web-deploy.yml
    with:
      environment: prod
      image_tag_prefix: prod
      listing_api: ${{ needs.read-manifest.outputs.listing_api }}
      messaging_api: ${{ needs.read-manifest.outputs.messaging_api }}
    secrets: inherit
