name: "CI: Frontend"

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "GitHub environment (dev or prod)"
      image_tag_prefix:
        required: true
        type: string
        description: "Image tag prefix (e.g. develop or prod)"
      auto_deploy:
        required: false
        type: boolean
        default: false
        description: "Auto-deploy after build"
      listing_api:
        required: false
        type: string
        default: ""
        description: "Listing service API URL"
      messaging_api:
        required: false
        type: string
        default: ""
        description: "Messaging service API URL"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Install Dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Run ESLint
        run: npm run lint -- --max-warnings 0
        working-directory: ./frontend

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Install Dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Run Unit Tests
        run: npm test
        working-directory: ./frontend

  security-scan:
    needs: [lint, test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=frontend/package-lock.json

  build-and-push:
    needs: security-scan
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      image: ${{ steps.build-image.outputs.image }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          provenance: false
          build-args: |
            NEXT_PUBLIC_COGNITO_USER_POOL_ID=${{ secrets.NEXT_PUBLIC_COGNITO_USER_POOL_ID }}
            NEXT_PUBLIC_COGNITO_CLIENT_ID=${{ secrets.NEXT_PUBLIC_COGNITO_CLIENT_ID }}
            NEXT_PUBLIC_BACKEND_API=${{ secrets.NEXT_PUBLIC_BACKEND_API }}
            NEXT_PUBLIC_LISTING_API=${{ inputs.listing_api }}
            NEXT_PUBLIC_MESSAGING_API=${{ inputs.messaging_api }}
            NEXT_PUBLIC_IMAGE_TAG=${{ inputs.image_tag_prefix }}-${{ steps.vars.outputs.sha_short }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/nusiss-team-1-voc/tcgm-web:${{ inputs.image_tag_prefix }}-latest
            ${{ steps.login-ecr.outputs.registry }}/nusiss-team-1-voc/tcgm-web:${{ inputs.image_tag_prefix }}-${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image output
        id: build-image
        run: echo "image=${{ steps.login-ecr.outputs.registry }}/nusiss-team-1-voc/tcgm-web:${{ inputs.image_tag_prefix }}-${{ steps.vars.outputs.sha_short }}" >> $GITHUB_OUTPUT

  deploy:
    if: ${{ inputs.auto_deploy }}
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: dev
    concurrency:
      group: web-deploy-dev
      cancel-in-progress: false
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition nusiss-team-1-voc-web \
            --query taskDefinition \
            > task-def.json

      - name: Update image in task definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        id: render
        with:
          task-definition: task-def.json
          container-name: web
          image: ${{ needs.build-and-push.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: nusiss-team-1-voc-web-service
          cluster: nusiss-team-1-voc-cluster
          wait-for-service-stability: true
