name: "Backend | Env: Develop"

on:
  workflow_dispatch:
  push:
    branches:
      - develop
    paths:
      - "backend/**"

permissions:
  id-token: write # Required for OIDC
  contents: read # Required for checkout

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./backend/package-lock.json"

      - name: Install Dependencies
        run: npm ci
        working-directory: ./backend

      - name: Run ESLint
        # --max-warnings 0 makes the build fail if there are ANY warnings
        run: npm run lint -- --max-warnings 0
        working-directory: ./backend

  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: "✂️ Set Short SHA"
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }} # Put the ARN from CloudFormation Outputs here
          aws-region: ap-southeast-1

      # 2. Log in to Amazon ECR
      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Build and Push to ECR
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/tcg-marketplace/tcgm-app:develop-latest
            ${{ steps.login-ecr.outputs.registry }}/tcg-marketplace/tcgm-app:develop-${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
