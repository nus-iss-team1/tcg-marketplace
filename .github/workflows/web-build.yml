name: "Frontend | Env: Develop"

on:
  workflow_dispatch:
  push:
    branches:
      - develop
    paths:
      - "frontend/**"

permissions:
  id-token: write # Required for OIDC
  contents: read # Required for checkout

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Install Dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Run ESLint
        # --max-warnings 0 makes the build fail if there are ANY warnings
        run: npm run lint -- --max-warnings 0
        working-directory: ./frontend

  security-scan:
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high # Fails only on High/Critical issues

  build-and-push:
    needs: security-scan
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build-image.outputs.image }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: "✂️ Set Short SHA"
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }} # Put the ARN from CloudFormation Outputs here
          aws-region: ap-southeast-1

      # 2. Log in to Amazon ECR
      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Build and Push to ECR
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          provenance: false
          build-args: |
            NEXT_PUBLIC_COGNITO_USER_POOL_ID=${{ secrets.NEXT_PUBLIC_COGNITO_USER_POOL_ID }}
            NEXT_PUBLIC_COGNITO_CLIENT_ID=${{ secrets.NEXT_PUBLIC_COGNITO_CLIENT_ID }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/tcg-marketplace/tcgm-web:develop-latest
            ${{ steps.login-ecr.outputs.registry }}/tcg-marketplace/tcgm-web:develop-${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image output
        id: build-image
        run: echo "image=${{ steps.login-ecr.outputs.registry }}/tcg-marketplace/tcgm-web:develop-${{ steps.vars.outputs.sha_short }}" >> $GITHUB_OUTPUT

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition tcg-marketplace-web \
            --query taskDefinition \
            > task-def.json

      - name: Update image in task definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        id: render
        with:
          task-definition: task-def.json
          container-name: web
          image: ${{ needs.build-and-push.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: tcg-marketplace-web-service
          cluster: tcg-marketplace-cluster
          wait-for-service-stability: true
