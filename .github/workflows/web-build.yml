name: "Frontend | Env: Develop"

on:
  workflow_dispatch:
  push:
    branches:
      - develop
    paths:
      - 'frontend/**'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: "✂️ Set Short SHA"
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          # This creates the "Universal" image for both Intel and Mac M1/M2
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}/tcgm-web:develop-latest
            ghcr.io/${{ github.repository }}/tcgm-web:develop-${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max