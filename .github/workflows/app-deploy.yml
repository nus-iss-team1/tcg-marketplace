name: "Backend | Reusable CI"

on:
  workflow_call:
    inputs:
      image_tag_prefix:
        required: true
        type: string
        description: "Image tag prefix (e.g. develop or prod)"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [listing]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./backend/${{ matrix.service }}-service/package-lock.json"

      - name: Install Dependencies
        run: npm ci
        working-directory: ./backend/${{ matrix.service }}-service

      - name: Run ESLint
        run: npm run lint -- --max-warnings 0
        working-directory: ./backend/${{ matrix.service }}-service

  security-scan:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [listing]
    defaults:
      run:
        working-directory: ./backend/${{ matrix.service }}-service
    steps:
      - uses: actions/checkout@v4

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=backend/${{ matrix.service }}-service/package-lock.json

  build-and-push:
    needs: security-scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [listing]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/${{ matrix.service }}-service
          file: ./backend/${{ matrix.service }}-service/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/nusiss-team-1-voc/tcgm-${{ matrix.service }}:${{ inputs.image_tag_prefix }}-latest
            ${{ steps.login-ecr.outputs.registry }}/nusiss-team-1-voc/tcgm-${{ matrix.service }}:${{ inputs.image_tag_prefix }}-${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
