name: "Backend | Reusable CI"

on:
  workflow_call:
    inputs:
      image_tag_prefix:
        required: true
        type: string
        description: "Image tag prefix (e.g. develop or prod)"
      auto_deploy:
        required: false
        type: boolean
        default: false
        description: "Auto-deploy after build"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [listing]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./backend/${{ matrix.service }}-service/package-lock.json"

      - name: Install Dependencies
        run: npm ci
        working-directory: ./backend/${{ matrix.service }}-service

      - name: Run ESLint
        run: npm run lint -- --max-warnings 0
        working-directory: ./backend/${{ matrix.service }}-service

  security-scan:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [listing]
    defaults:
      run:
        working-directory: ./backend/${{ matrix.service }}-service
    steps:
      - uses: actions/checkout@v4

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=backend/${{ matrix.service }}-service/package-lock.json

  build-and-push:
    needs: security-scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [listing]
    outputs:
      image: ${{ steps.build-image.outputs.image }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/${{ matrix.service }}-service
          file: ./backend/${{ matrix.service }}-service/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/nusiss-team-1-voc/tcgm-${{ matrix.service }}:${{ inputs.image_tag_prefix }}-latest
            ${{ steps.login-ecr.outputs.registry }}/nusiss-team-1-voc/tcgm-${{ matrix.service }}:${{ inputs.image_tag_prefix }}-${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image output
        id: build-image
        run: echo "image=${{ steps.login-ecr.outputs.registry }}/nusiss-team-1-voc/tcgm-${{ matrix.service }}:${{ inputs.image_tag_prefix }}-${{ steps.vars.outputs.sha_short }}" >> $GITHUB_OUTPUT

  deploy:
    if: ${{ inputs.auto_deploy }}
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: dev
    concurrency:
      group: app-deploy-dev-${{ matrix.service }}
      cancel-in-progress: false
    strategy:
      matrix:
        service: [listing]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition nusiss-team-1-voc-${{ matrix.service }}-service \
            --query taskDefinition \
            > task-def.json

      - name: Update image in task definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        id: render
        with:
          task-definition: task-def.json
          container-name: app
          image: ${{ needs.build-and-push.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: nusiss-team-1-voc-${{ matrix.service }}-service
          cluster: nusiss-team-1-voc-cluster
          wait-for-service-stability: true
