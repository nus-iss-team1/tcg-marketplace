AWSTemplateFormatVersion: '2010-09-09'
Description: ECS Task Definitions, Services, IAM Roles, Log Groups

Parameters:
  ProjectNamespace:
    Type: String
    Default: nusiss-team-1-voc
  Environment:
    Type: String
    Default: ""
    Description: "Environment prefix (e.g. prod). Leave empty for dev."
  AppImageTag:
    Type: String
    Default: develop-latest
  MessagingImageTag:
    Type: String
    Default: develop-latest
  WebImageTag:
    Type: String
    Default: develop-latest
  HighAvailability:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: "Enable HA (min 2 tasks). Set false for dev to save costs."
  BaseDomainName:
    Type: String
    Default: ""
    Description: "Base domain (e.g. dev.vaultofcards.io). Leave empty to skip."

Conditions:
  HasEnvPrefix: !Not [!Equals [!Ref Environment, ""]]
  IsHA: !Equals [!Ref HighAvailability, "true"]
  HasDomain: !Not [!Equals [!Ref BaseDomainName, ""]]

Resources:
  # IAM Roles
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-ecs-execution-role"
        - !Sub "${ProjectNamespace}-ecs-execution-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

  # ── Listing Service Task Role (S3 + GameCardLookup + MessagingPlatform + TCGMarketplace) ──
  ListingTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-listing-task-role"
        - !Sub "${ProjectNamespace}-listing-task-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                  - !Sub
                    - "${BucketArn}/*"
                    - BucketArn: !If
                        - HasEnvPrefix
                        - !ImportValue
                            Fn::Sub: "${ProjectNamespace}-${Environment}-AssetsBucketArn"
                        - !ImportValue
                            Fn::Sub: "${ProjectNamespace}-AssetsBucketArn"
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - !If
                    - HasEnvPrefix
                    - !ImportValue
                        Fn::Sub: "${ProjectNamespace}-${Environment}-AssetsBucketArn"
                    - !ImportValue
                        Fn::Sub: "${ProjectNamespace}-AssetsBucketArn"
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  # GameCardLookup table + indexes
                  - !If
                    - HasEnvPrefix
                    - !ImportValue
                        Fn::Sub: "${ProjectNamespace}-${Environment}-GameCardLookupTableArn"
                    - !ImportValue
                        Fn::Sub: "${ProjectNamespace}-GameCardLookupTableArn"
                  - !Sub
                    - "${TableArn}/index/*"
                    - TableArn: !If
                        - HasEnvPrefix
                        - !ImportValue
                            Fn::Sub: "${ProjectNamespace}-${Environment}-GameCardLookupTableArn"
                        - !ImportValue
                            Fn::Sub: "${ProjectNamespace}-GameCardLookupTableArn"
                  # MessagingPlatform table + indexes
                  - !If
                    - HasEnvPrefix
                    - !ImportValue
                        Fn::Sub: "${ProjectNamespace}-${Environment}-MessagingPlatformTableArn"
                    - !ImportValue
                        Fn::Sub: "${ProjectNamespace}-MessagingPlatformTableArn"
                  - !Sub
                    - "${TableArn}/index/*"
                    - TableArn: !If
                        - HasEnvPrefix
                        - !ImportValue
                            Fn::Sub: "${ProjectNamespace}-${Environment}-MessagingPlatformTableArn"
                        - !ImportValue
                            Fn::Sub: "${ProjectNamespace}-MessagingPlatformTableArn"
                  # TCGMarketplace table + indexes
                  - !If
                    - HasEnvPrefix
                    - !ImportValue
                        Fn::Sub: "${ProjectNamespace}-${Environment}-TCGMarketplaceTableArn"
                    - !ImportValue
                        Fn::Sub: "${ProjectNamespace}-TCGMarketplaceTableArn"
                  - !Sub
                    - "${TableArn}/index/*"
                    - TableArn: !If
                        - HasEnvPrefix
                        - !ImportValue
                            Fn::Sub: "${ProjectNamespace}-${Environment}-TCGMarketplaceTableArn"
                        - !ImportValue
                            Fn::Sub: "${ProjectNamespace}-TCGMarketplaceTableArn"
                  # UserProfile table + indexes
                  - !If
                    - HasEnvPrefix
                    - !ImportValue
                        Fn::Sub: "${ProjectNamespace}-${Environment}-UserProfileTableArn"
                    - !ImportValue
                        Fn::Sub: "${ProjectNamespace}-UserProfileTableArn"
                  - !Sub
                    - "${TableArn}/index/*"
                    - TableArn: !If
                        - HasEnvPrefix
                        - !ImportValue
                            Fn::Sub: "${ProjectNamespace}-${Environment}-UserProfileTableArn"
                        - !ImportValue
                            Fn::Sub: "${ProjectNamespace}-UserProfileTableArn"

  # ── Messaging Service Task Role (MessagingPlatform only) ──
  MessagingTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-messaging-task-role"
        - !Sub "${ProjectNamespace}-messaging-task-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !If
                    - HasEnvPrefix
                    - !ImportValue
                        Fn::Sub: "${ProjectNamespace}-${Environment}-MessagingPlatformTableArn"
                    - !ImportValue
                        Fn::Sub: "${ProjectNamespace}-MessagingPlatformTableArn"
                  - !Sub
                    - "${TableArn}/index/*"
                    - TableArn: !If
                        - HasEnvPrefix
                        - !ImportValue
                            Fn::Sub: "${ProjectNamespace}-${Environment}-MessagingPlatformTableArn"
                        - !ImportValue
                            Fn::Sub: "${ProjectNamespace}-MessagingPlatformTableArn"

  # ── Web Task Role (no AWS resource access needed) ──
  WebTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-web-task-role"
        - !Sub "${ProjectNamespace}-web-task-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

  # Log Groups
  ListingServiceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !If
        - HasEnvPrefix
        - !Sub "/ecs/${ProjectNamespace}-${Environment}/listing-service"
        - !Sub "/ecs/${ProjectNamespace}/listing-service"
      RetentionInDays: 14

  MessagingServiceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !If
        - HasEnvPrefix
        - !Sub "/ecs/${ProjectNamespace}-${Environment}/messaging-service"
        - !Sub "/ecs/${ProjectNamespace}/messaging-service"
      RetentionInDays: 14

  WebLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !If
        - HasEnvPrefix
        - !Sub "/ecs/${ProjectNamespace}-${Environment}/web"
        - !Sub "/ecs/${ProjectNamespace}/web"
      RetentionInDays: 14

  # Task Definitions
  ListingServiceTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-listing-service"
        - !Sub "${ProjectNamespace}-listing-service"
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ListingTaskRole.Arn
      ContainerDefinitions:
        - Name: app
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ProjectNamespace}/tcgm-listing:${AppImageTag}"
          PortMappings:
            - ContainerPort: 3001
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ListingServiceLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: listing-service
          Environment:
            - Name: TZ
              Value: Asia/Singapore
            - Name: LOG_DIR
              Value: /tmp/logs
            - Name: LOG_LEVEL
              Value: info
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: AWS_S3_BUCKET
              Value: !If
                - HasEnvPrefix
                - !ImportValue
                    Fn::Sub: "${ProjectNamespace}-${Environment}-AssetsBucketName"
                - !ImportValue
                    Fn::Sub: "${ProjectNamespace}-AssetsBucketName"
            - Name: COGNITO_USER_POOL_ID
              Value: !If
                - HasEnvPrefix
                - !ImportValue
                    Fn::Sub: "${ProjectNamespace}-${Environment}-UserPoolId"
                - !ImportValue
                    Fn::Sub: "${ProjectNamespace}-dev-UserPoolId"
            - Name: COGNITO_APP_CLIENT_ID
              Value: !If
                - HasEnvPrefix
                - !ImportValue
                    Fn::Sub: "${ProjectNamespace}-${Environment}-UserPoolClientId"
                - !ImportValue
                    Fn::Sub: "${ProjectNamespace}-dev-UserPoolClientId"
            - Name: GAME_CARD_LOOKUP_TABLE
              Value: !If
                - HasEnvPrefix
                - !ImportValue
                    Fn::Sub: "${ProjectNamespace}-${Environment}-GameCardLookupTableName"
                - !ImportValue
                    Fn::Sub: "${ProjectNamespace}-GameCardLookupTableName"
            - Name: MESSAGING_PLATFORM_TABLE
              Value: !If
                - HasEnvPrefix
                - !ImportValue
                    Fn::Sub: "${ProjectNamespace}-${Environment}-MessagingPlatformTableName"
                - !ImportValue
                    Fn::Sub: "${ProjectNamespace}-MessagingPlatformTableName"
            - Name: TCG_MARKETPLACE_TABLE
              Value: !If
                - HasEnvPrefix
                - !ImportValue
                    Fn::Sub: "${ProjectNamespace}-${Environment}-TCGMarketplaceTableName"
                - !ImportValue
                    Fn::Sub: "${ProjectNamespace}-TCGMarketplaceTableName"
            - Name: CDN_URL
              Value: !If
                - HasEnvPrefix
                - !ImportValue
                    Fn::Sub: "${ProjectNamespace}-${Environment}-AssetsCDNUrl"
                - !ImportValue
                    Fn::Sub: "${ProjectNamespace}-AssetsCDNUrl"
            - Name: USER_PROFILE_TABLE
              Value: !If
                - HasEnvPrefix
                - !ImportValue
                    Fn::Sub: "${ProjectNamespace}-${Environment}-UserProfileTableName"
                - !ImportValue
                    Fn::Sub: "${ProjectNamespace}-UserProfileTableName"

  MessagingServiceTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-messaging-service"
        - !Sub "${ProjectNamespace}-messaging-service"
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt MessagingTaskRole.Arn
      ContainerDefinitions:
        - Name: app
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ProjectNamespace}/tcgm-messaging:${MessagingImageTag}"
          PortMappings:
            - ContainerPort: 3002
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref MessagingServiceLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: messaging-service
          Environment:
            - Name: TZ
              Value: Asia/Singapore
            - Name: LOG_DIR
              Value: /tmp/logs
            - Name: LOG_LEVEL
              Value: info
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: COGNITO_USER_POOL_ID
              Value: !If
                - HasEnvPrefix
                - !ImportValue
                    Fn::Sub: "${ProjectNamespace}-${Environment}-UserPoolId"
                - !ImportValue
                    Fn::Sub: "${ProjectNamespace}-dev-UserPoolId"
            - Name: COGNITO_APP_CLIENT_ID
              Value: !If
                - HasEnvPrefix
                - !ImportValue
                    Fn::Sub: "${ProjectNamespace}-${Environment}-UserPoolClientId"
                - !ImportValue
                    Fn::Sub: "${ProjectNamespace}-dev-UserPoolClientId"
            - Name: MESSAGING_PLATFORM_TABLE
              Value: !If
                - HasEnvPrefix
                - !ImportValue
                    Fn::Sub: "${ProjectNamespace}-${Environment}-MessagingPlatformTableName"
                - !ImportValue
                    Fn::Sub: "${ProjectNamespace}-MessagingPlatformTableName"

  WebTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-web"
        - !Sub "${ProjectNamespace}-web"
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt WebTaskRole.Arn
      ContainerDefinitions:
        - Name: web
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ProjectNamespace}/tcgm-web:${WebImageTag}"
          PortMappings:
            - ContainerPort: 3000
          Environment:
            - Name: NEXT_PUBLIC_BACKEND_API
              Value: !Sub
                - "http://${ALBDns}"
                - ALBDns: !If
                    - HasEnvPrefix
                    - !ImportValue
                        Fn::Sub: "${ProjectNamespace}-${Environment}-ALBDnsName"
                    - !ImportValue
                        Fn::Sub: "${ProjectNamespace}-ALBDnsName"
            - Name: NEXT_PUBLIC_LISTING_API
              Value: !If
                - HasDomain
                - !Sub "https://listing.${BaseDomainName}"
                - !Sub
                  - "http://${ALBDns}"
                  - ALBDns: !If
                      - HasEnvPrefix
                      - !ImportValue
                          Fn::Sub: "${ProjectNamespace}-${Environment}-ALBDnsName"
                      - !ImportValue
                          Fn::Sub: "${ProjectNamespace}-ALBDnsName"
            - Name: NEXT_PUBLIC_MESSAGING_API
              Value: !If
                - HasDomain
                - !Sub "https://messaging.${BaseDomainName}"
                - !Sub
                  - "http://${ALBDns}"
                  - ALBDns: !If
                      - HasEnvPrefix
                      - !ImportValue
                          Fn::Sub: "${ProjectNamespace}-${Environment}-ALBDnsName"
                      - !ImportValue
                          Fn::Sub: "${ProjectNamespace}-ALBDnsName"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref WebLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: web

  # Services
  ListingService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-listing-service"
        - !Sub "${ProjectNamespace}-listing-service"
      Cluster: !If
        - HasEnvPrefix
        - !ImportValue
            Fn::Sub: "${ProjectNamespace}-${Environment}-ClusterArn"
        - !ImportValue
            Fn::Sub: "${ProjectNamespace}-ClusterArn"
      TaskDefinition: !Ref ListingServiceTaskDefinition
      DesiredCount: !If [IsHA, 2, 1]
      LaunchType: FARGATE
      HealthCheckGracePeriodSeconds: 60
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets: !Split
            - ","
            - !If
              - HasEnvPrefix
              - !ImportValue
                  Fn::Sub: "${ProjectNamespace}-${Environment}-PrivateSubnetIds"
              - !ImportValue
                  Fn::Sub: "${ProjectNamespace}-PrivateSubnetIds"
          SecurityGroups:
            - !If
              - HasEnvPrefix
              - !ImportValue
                  Fn::Sub: "${ProjectNamespace}-${Environment}-ECSSecurityGroupId"
              - !ImportValue
                  Fn::Sub: "${ProjectNamespace}-ECSSecurityGroupId"
      LoadBalancers:
        - ContainerName: app
          ContainerPort: 3001
          TargetGroupArn: !If
            - HasEnvPrefix
            - !ImportValue
                Fn::Sub: "${ProjectNamespace}-${Environment}-AppTargetGroupArn"
            - !ImportValue
                Fn::Sub: "${ProjectNamespace}-AppTargetGroupArn"

  WebService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-web-service"
        - !Sub "${ProjectNamespace}-web-service"
      Cluster: !If
        - HasEnvPrefix
        - !ImportValue
            Fn::Sub: "${ProjectNamespace}-${Environment}-ClusterArn"
        - !ImportValue
            Fn::Sub: "${ProjectNamespace}-ClusterArn"
      TaskDefinition: !Ref WebTaskDefinition
      DesiredCount: !If [IsHA, 2, 1]
      LaunchType: FARGATE
      HealthCheckGracePeriodSeconds: 60
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets: !Split
            - ","
            - !If
              - HasEnvPrefix
              - !ImportValue
                  Fn::Sub: "${ProjectNamespace}-${Environment}-PrivateSubnetIds"
              - !ImportValue
                  Fn::Sub: "${ProjectNamespace}-PrivateSubnetIds"
          SecurityGroups:
            - !If
              - HasEnvPrefix
              - !ImportValue
                  Fn::Sub: "${ProjectNamespace}-${Environment}-ECSSecurityGroupId"
              - !ImportValue
                  Fn::Sub: "${ProjectNamespace}-ECSSecurityGroupId"
      LoadBalancers:
        - ContainerName: web
          ContainerPort: 3000
          TargetGroupArn: !If
            - HasEnvPrefix
            - !ImportValue
                Fn::Sub: "${ProjectNamespace}-${Environment}-WebTargetGroupArn"
            - !ImportValue
                Fn::Sub: "${ProjectNamespace}-WebTargetGroupArn"

  MessagingService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-messaging-service"
        - !Sub "${ProjectNamespace}-messaging-service"
      Cluster: !If
        - HasEnvPrefix
        - !ImportValue
            Fn::Sub: "${ProjectNamespace}-${Environment}-ClusterArn"
        - !ImportValue
            Fn::Sub: "${ProjectNamespace}-ClusterArn"
      TaskDefinition: !Ref MessagingServiceTaskDefinition
      DesiredCount: !If [IsHA, 2, 1]
      LaunchType: FARGATE
      HealthCheckGracePeriodSeconds: 60
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets: !Split
            - ","
            - !If
              - HasEnvPrefix
              - !ImportValue
                  Fn::Sub: "${ProjectNamespace}-${Environment}-PrivateSubnetIds"
              - !ImportValue
                  Fn::Sub: "${ProjectNamespace}-PrivateSubnetIds"
          SecurityGroups:
            - !If
              - HasEnvPrefix
              - !ImportValue
                  Fn::Sub: "${ProjectNamespace}-${Environment}-ECSSecurityGroupId"
              - !ImportValue
                  Fn::Sub: "${ProjectNamespace}-ECSSecurityGroupId"
      LoadBalancers:
        - ContainerName: app
          ContainerPort: 3002
          TargetGroupArn: !If
            - HasEnvPrefix
            - !ImportValue
                Fn::Sub: "${ProjectNamespace}-${Environment}-MessagingTargetGroupArn"
            - !ImportValue
                Fn::Sub: "${ProjectNamespace}-MessagingTargetGroupArn"

  # ════════════════════════════════════════════════════════════
  # Auto Scaling
  # ════════════════════════════════════════════════════════════

  AutoScalingRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-autoscaling-role"
        - !Sub "${ProjectNamespace}-autoscaling-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: application-autoscaling.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceAutoscaleRole

  # Listing Service Auto Scaling
  ListingServiceScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: !If [IsHA, 4, 2]
      MinCapacity: !If [IsHA, 2, 1]
      ResourceId: !Sub
        - "service/${ClusterName}/${ServiceName}"
        - ClusterName: !If
            - HasEnvPrefix
            - !ImportValue
                Fn::Sub: "${ProjectNamespace}-${Environment}-ClusterName"
            - !ImportValue
                Fn::Sub: "${ProjectNamespace}-ClusterName"
          ServiceName: !GetAtt ListingService.Name
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs
      RoleARN: !GetAtt AutoScalingRole.Arn

  ListingServiceScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-listing-cpu-scaling"
        - !Sub "${ProjectNamespace}-listing-cpu-scaling"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ListingServiceScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 70
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

  # Messaging Service Auto Scaling
  MessagingServiceScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: !If [IsHA, 4, 2]
      MinCapacity: !If [IsHA, 2, 1]
      ResourceId: !Sub
        - "service/${ClusterName}/${ServiceName}"
        - ClusterName: !If
            - HasEnvPrefix
            - !ImportValue
                Fn::Sub: "${ProjectNamespace}-${Environment}-ClusterName"
            - !ImportValue
                Fn::Sub: "${ProjectNamespace}-ClusterName"
          ServiceName: !GetAtt MessagingService.Name
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs
      RoleARN: !GetAtt AutoScalingRole.Arn

  MessagingServiceScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-messaging-cpu-scaling"
        - !Sub "${ProjectNamespace}-messaging-cpu-scaling"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref MessagingServiceScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 70
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

  # Web Service Auto Scaling
  WebServiceScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: !If [IsHA, 4, 2]
      MinCapacity: !If [IsHA, 2, 1]
      ResourceId: !Sub
        - "service/${ClusterName}/${ServiceName}"
        - ClusterName: !If
            - HasEnvPrefix
            - !ImportValue
                Fn::Sub: "${ProjectNamespace}-${Environment}-ClusterName"
            - !ImportValue
                Fn::Sub: "${ProjectNamespace}-ClusterName"
          ServiceName: !GetAtt WebService.Name
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs
      RoleARN: !GetAtt AutoScalingRole.Arn

  WebServiceScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-web-cpu-scaling"
        - !Sub "${ProjectNamespace}-web-cpu-scaling"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref WebServiceScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 70
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

  # ════════════════════════════════════════════════════════════
  # Monitoring & Alerts
  # ════════════════════════════════════════════════════════════

  # ── High CPU Alarms (>85% for 5 min) ─────────────────────
  ListingServiceHighCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-listing-high-cpu"
        - !Sub "${ProjectNamespace}-listing-high-cpu"
      AlarmDescription: "Listing service CPU > 85% for 5 minutes"
      Namespace: AWS/ECS
      MetricName: CPUUtilization
      Dimensions:
        - Name: ClusterName
          Value: !If
            - HasEnvPrefix
            - !ImportValue
                Fn::Sub: "${ProjectNamespace}-${Environment}-ClusterName"
            - !ImportValue
                Fn::Sub: "${ProjectNamespace}-ClusterName"
        - Name: ServiceName
          Value: !GetAtt ListingService.Name
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 85
      ComparisonOperator: GreaterThanThreshold


  MessagingServiceHighCPUAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-messaging-high-cpu"
        - !Sub "${ProjectNamespace}-messaging-high-cpu"
      AlarmDescription: "Messaging service CPU > 85% for 5 minutes"
      Namespace: AWS/ECS
      MetricName: CPUUtilization
      Dimensions:
        - Name: ClusterName
          Value: !If
            - HasEnvPrefix
            - !ImportValue
                Fn::Sub: "${ProjectNamespace}-${Environment}-ClusterName"
            - !ImportValue
                Fn::Sub: "${ProjectNamespace}-ClusterName"
        - Name: ServiceName
          Value: !GetAtt MessagingService.Name
      Statistic: Average
      Period: 300
