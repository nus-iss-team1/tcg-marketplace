AWSTemplateFormatVersion: '2010-09-09'
Description: DynamoDB Table (on-demand billing)

Parameters:
  ProjectNamespace:
    Type: String
    Default: tcg-marketplace
  TableName:
    Type: String
    Default: tcg-marketplace-table

Resources:
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Ref TableName
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

Outputs:
  TableName:
    Value: !Ref DynamoDBTable
    Export:
      Name: !Sub "${ProjectNamespace}-TableName"

  TableArn:
    Value: !GetAtt DynamoDBTable.Arn
    Export:
      Name: !Sub "${ProjectNamespace}-TableArn"
