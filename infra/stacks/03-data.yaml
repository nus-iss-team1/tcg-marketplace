AWSTemplateFormatVersion: '2010-09-09'
Description: "S3 Storage and DynamoDB Tables"

Parameters:
  ProjectNamespace:
    Type: String
    Default: nusiss-team-1-voc

Resources:

 AssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectNamespace}-assets"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  AssetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AssetsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${AssetsBucket.Arn}/*"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${AssetsCDN}"


  AssetsCDNOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${ProjectNamespace}-assets-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  AssetsCDN:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "${ProjectNamespace} - S3 Assets CDN"
        DefaultCacheBehavior:
          TargetOriginId: S3AssetsOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6 # CachingOptimized
          Compress: true
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
        Origins:
          - Id: S3AssetsOrigin
            DomainName: !GetAtt AssetsBucket.RegionalDomainName
            OriginAccessControlId: !Ref AssetsCDNOriginAccessControl
            S3OriginConfig:
              OriginAccessIdentity: ""
        HttpVersion: http2
        PriceClass: PriceClass_200


  GameCardLookup:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TableName: GameCardLookup
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: gameId
          AttributeType: S
        - AttributeName: meta
          AttributeType: S
      KeySchema:
        - AttributeName: gameId
          KeyType: HASH
        - AttributeName: meta
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  MessagingPlatform:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TableName: MessagingPlatform
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: entityId
          AttributeType: S
        - AttributeName: entityType
          AttributeType: S
        - AttributeName: lastMessageAt
          AttributeType: N
        - AttributeName: createdAt
          AttributeType: N
      KeySchema:
        - AttributeName: entityId
          KeyType: HASH
        - AttributeName: entityType
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      GlobalSecondaryIndexes:
        - IndexName: RoomIndex
          KeySchema:
            - AttributeName: entityId
              KeyType: HASH
            - AttributeName: lastMessageAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: MessageIndex
          KeySchema:
            - AttributeName: entityId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  TCGMarketplace:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TableName: TCGMarketplace
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: gameName
          AttributeType: S
        - AttributeName: sellerId
          AttributeType: S
        - AttributeName: listingId
          AttributeType: S
        - AttributeName: listingUpdatedAt
          AttributeType: S
        - AttributeName: listingCardName
          AttributeType: S
        - AttributeName: listingPrice
          AttributeType: S
      KeySchema:
        - AttributeName: gameName
          KeyType: HASH
        - AttributeName: listingId
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      GlobalSecondaryIndexes:
        - IndexName: SellerListingIndex
          KeySchema:
            - AttributeName: sellerId
              KeyType: HASH
            - AttributeName: listingUpdatedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: UpdatedListingIndex
          KeySchema:
            - AttributeName: gameName
              KeyType: HASH
            - AttributeName: listingUpdatedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: CardListingIndex
          KeySchema:
            - AttributeName: gameName
              KeyType: HASH
            - AttributeName: listingCardName
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: PriceListingIndex
          KeySchema:
            - AttributeName: gameName
              KeyType: HASH
            - AttributeName: listingPrice
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

Outputs:
  # Storage
  AssetsBucketName:
    Description: "The name of the S3 assets bucket"
    Value: !Ref AssetsBucket
    Export:
      Name: !Sub "${ProjectNamespace}-AssetsBucketName"
  AssetsBucketArn:
    Description: "The ARN of the S3 assets bucket"
    Value: !GetAtt AssetsBucket.Arn
    Export:
      Name: !Sub "${ProjectNamespace}-AssetsBucketArn"
  AssetsCDNDomainName:
    Description: "CloudFront distribution domain for S3 assets"
    Value: !GetAtt AssetsCDN.DomainName
    Export:
      Name: !Sub "${ProjectNamespace}-AssetsCDNDomainName"
  AssetsCDNUrl:
    Description: "CloudFront URL for S3 assets"
    Value: !Sub "https://${AssetsCDN.DomainName}"
    Export:
      Name: !Sub "${ProjectNamespace}-AssetsCDNUrl"

  # Database
  GameCardLookupTableName:
    Description: "The name of the DynamoDB table GameCardLookup"
    Value: !Ref GameCardLookup
    Export:
      Name: !Sub "${ProjectNamespace}-GameCardLookupTableName"
  GameCardLookupTableArn:
    Description: "The ARN of the DynamoDB table GameCardLookup"
    Value: !GetAtt GameCardLookup.Arn
    Export:
      Name: !Sub "${ProjectNamespace}-GameCardLookupTableArn"
  MessagingPlatformTableName:
    Description: "The name of the DynamoDB table MessagingPlatform"
    Value: !Ref MessagingPlatform
    Export:
      Name: !Sub "${ProjectNamespace}-MessagingPlatformTableName"
  MessagingPlatformTableArn:
    Description: "The ARN of the DynamoDB table MessagingPlatform"
    Value: !GetAtt MessagingPlatform.Arn
    Export:
      Name: !Sub "${ProjectNamespace}-MessagingPlatformTableArn"
  TCGMarketplaceTableName:
    Description: "The name of the DynamoDB table TCGMarketplace"
    Value: !Ref TCGMarketplace
    Export:
      Name: !Sub "${ProjectNamespace}-TCGMarketplaceTableName"
  TCGMarketplaceTableArn:
    Description: "The ARN of the DynamoDB table TCGMarketplace"
    Value: !GetAtt TCGMarketplace.Arn
    Export:
      Name: !Sub "${ProjectNamespace}-TCGMarketplaceTableArn"
