AWSTemplateFormatVersion: '2010-09-09'
Description: ECS Task Definitions, Services, IAM Roles, Log Groups

Parameters:
  ProjectNamespace:
    Type: String
    Default: tcg-marketplace
  AppImageTag:
    Type: String
    Default: develop-latest
  WebImageTag:
    Type: String
    Default: develop-latest

Resources:
  # IAM Roles
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectNamespace}-ecs-execution-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectNamespace}-ecs-task-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                  - !Sub
                    - "${BucketArn}/*"
                    - BucketArn: !ImportValue
                        Fn::Sub: "${ProjectNamespace}-AssetsBucketArn"
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - !ImportValue
                      Fn::Sub: "${ProjectNamespace}-AssetsBucketArn"
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  # GameCardLookup table + indexes
                  - !ImportValue
                      Fn::Sub: "${ProjectNamespace}-GameCardLookupTableArn"
                  - !Sub
                    - "${TableArn}/index/*"
                    - TableArn: !ImportValue
                        Fn::Sub: "${ProjectNamespace}-GameCardLookupTableArn"
                  # MessagingPlatform table + indexes
                  - !ImportValue
                      Fn::Sub: "${ProjectNamespace}-MessagingPlatformTableArn"
                  - !Sub
                    - "${TableArn}/index/*"
                    - TableArn: !ImportValue
                        Fn::Sub: "${ProjectNamespace}-MessagingPlatformTableArn"
                  # TCGMarketplace table + indexes
                  - !ImportValue
                      Fn::Sub: "${ProjectNamespace}-TCGMarketplaceTableArn"
                  - !Sub
                    - "${TableArn}/index/*"
                    - TableArn: !ImportValue
                        Fn::Sub: "${ProjectNamespace}-TCGMarketplaceTableArn"

  # Log Groups
  ListingServiceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${ProjectNamespace}/listing-service"
      RetentionInDays: 14

  WebLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${ProjectNamespace}/web"
      RetentionInDays: 14

  # Task Definitions
  ListingServiceTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${ProjectNamespace}-listing-service"
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: app
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ProjectNamespace}/tcgm-listing:${AppImageTag}"
          PortMappings:
            - ContainerPort: 3001
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ListingServiceLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: listing-service
          Environment:
            - Name: TZ
              Value: Asia/Singapore
            - Name: LOG_DIR
              Value: /tmp/logs
            - Name: LOG_LEVEL
              Value: info
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: AWS_S3_BUCKET
              Value: !ImportValue
                Fn::Sub: "${ProjectNamespace}-AssetsBucketName"
            - Name: COGNITO_USER_POOL_ID
              Value: !ImportValue
                Fn::Sub: "${ProjectNamespace}-dev-UserPoolId"
            - Name: COGNITO_APP_CLIENT_ID
              Value: !ImportValue
                Fn::Sub: "${ProjectNamespace}-dev-UserPoolClientId"
            - Name: GAME_CARD_LOOKUP_TABLE
              Value: !ImportValue
                Fn::Sub: "${ProjectNamespace}-GameCardLookupTableName"
            - Name: MESSAGING_PLATFORM_TABLE
              Value: !ImportValue
                Fn::Sub: "${ProjectNamespace}-MessagingPlatformTableName"
            - Name: TCG_MARKETPLACE_TABLE
              Value: !ImportValue
                Fn::Sub: "${ProjectNamespace}-TCGMarketplaceTableName"

  WebTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${ProjectNamespace}-web"
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: web
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ProjectNamespace}/tcgm-web:${WebImageTag}"
          PortMappings:
            - ContainerPort: 3000
          Environment:
            - Name: NEXT_PUBLIC_BACKEND_API
              Value: !Sub
                - "http://${ALBDns}"
                - ALBDns: !ImportValue
                    Fn::Sub: "${ProjectNamespace}-ALBDnsName"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref WebLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: web

  # Services
  ListingService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${ProjectNamespace}-listing-service"
      Cluster: !ImportValue
        Fn::Sub: "${ProjectNamespace}-ClusterArn"
      TaskDefinition: !Ref ListingServiceTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Split
            - ","
            - !ImportValue
                Fn::Sub: "${ProjectNamespace}-PublicSubnetIds"
          SecurityGroups:
            - !ImportValue
                Fn::Sub: "${ProjectNamespace}-ECSSecurityGroupId"
      LoadBalancers:
        - ContainerName: app
          ContainerPort: 3001
          TargetGroupArn: !ImportValue
            Fn::Sub: "${ProjectNamespace}-AppTargetGroupArn"

  WebService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${ProjectNamespace}-web-service"
      Cluster: !ImportValue
        Fn::Sub: "${ProjectNamespace}-ClusterArn"
      TaskDefinition: !Ref WebTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Split
            - ","
            - !ImportValue
                Fn::Sub: "${ProjectNamespace}-PublicSubnetIds"
          SecurityGroups:
            - !ImportValue
                Fn::Sub: "${ProjectNamespace}-ECSSecurityGroupId"
      LoadBalancers:
        - ContainerName: web
          ContainerPort: 3000
          TargetGroupArn: !ImportValue
            Fn::Sub: "${ProjectNamespace}-WebTargetGroupArn"

Outputs:
  ListingServiceName:
    Value: !GetAtt ListingService.Name
    Export:
      Name: !Sub "${ProjectNamespace}-ListingServiceName"

  WebServiceName:
    Value: !GetAtt WebService.Name
    Export:
      Name: !Sub "${ProjectNamespace}-WebServiceName"
