AWSTemplateFormatVersion: '2010-09-09'
Description: Full Stack ECS Services - Frontend and Backend with Path-Based Routing

Parameters:
  ProjectNamespace:
    Type: String
    Default: tcg-marketplace
  AppImageTag:
    Type: String
    Default: latest
    Description: Docker image tag for backend
  WebImageTag:
    Type: String
    Default: latest
    Description: Docker image tag for frontend

Resources:
  # CloudWatch Log Groups
  AppLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${ProjectNamespace}/app-fullstack"
      RetentionInDays: 14

  WebLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${ProjectNamespace}/web-fullstack"
      RetentionInDays: 14

  # IAM Roles
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectNamespace}-ecs-execution-role-fullstack"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectNamespace}-ecs-task-role-fullstack"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !ImportValue
                      Fn::Sub: "${ProjectNamespace}-GameCardLookupTableArn"
                  - !Sub
                    - "${TableArn}/index/*"
                    - TableArn: !ImportValue
                        Fn::Sub: "${ProjectNamespace}-GameCardLookupTableArn"
                  - !ImportValue
                      Fn::Sub: "${ProjectNamespace}-MessagingPlatformTableArn"
                  - !Sub
                    - "${TableArn}/index/*"
                    - TableArn: !ImportValue
                        Fn::Sub: "${ProjectNamespace}-MessagingPlatformTableArn"
                  - !ImportValue
                      Fn::Sub: "${ProjectNamespace}-TCGMarketplaceTableArn"
                  - !Sub
                    - "${TableArn}/index/*"
                    - TableArn: !ImportValue
                        Fn::Sub: "${ProjectNamespace}-TCGMarketplaceTableArn"
        - PolicyName: S3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:GetObjectVersion
                Resource: !Sub
                  - "${BucketArn}/*"
                  - BucketArn: !ImportValue
                      Fn::Sub: "${ProjectNamespace}-MediaBucketArn"
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource: !ImportValue
                  Fn::Sub: "${ProjectNamespace}-MediaBucketArn"

  # Backend Task Definition
  AppTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${ProjectNamespace}-app-fullstack"
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: app
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ProjectNamespace}/tcgm-app:${AppImageTag}"
          PortMappings:
            - ContainerPort: 3000
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref AppLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: app
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: PORT
              Value: "3000"
            - Name: GAME_CARD_LOOKUP_TABLE
              Value: !ImportValue
                Fn::Sub: "${ProjectNamespace}-GameCardLookupTableName"
            - Name: MESSAGING_PLATFORM_TABLE
              Value: !ImportValue
                Fn::Sub: "${ProjectNamespace}-MessagingPlatformTableName"
            - Name: TCG_MARKETPLACE_TABLE
              Value: !ImportValue
                Fn::Sub: "${ProjectNamespace}-TCGMarketplaceTableName"
            - Name: MEDIA_BUCKET_NAME
              Value: !ImportValue
                Fn::Sub: "${ProjectNamespace}-MediaBucketName"
            - Name: AWS_REGION
              Value: !Ref AWS::Region

  # Frontend Task Definition
  WebTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${ProjectNamespace}-web-fullstack"
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: web
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ProjectNamespace}/tcgm-web:${WebImageTag}"
          PortMappings:
            - ContainerPort: 3000
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref WebLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: web
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: PORT
              Value: "3000"
            - Name: NEXT_PUBLIC_API_URL
              Value: !Sub
                - "http://${ALBDns}/api"
                - ALBDns: !ImportValue
                    Fn::Sub: "${ProjectNamespace}-ALBDnsName"

  # Backend ECS Service
  AppService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${ProjectNamespace}-app-fullstack"
      Cluster: !ImportValue
        Fn::Sub: "${ProjectNamespace}-ClusterArn"
      TaskDefinition: !Ref AppTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Split
            - ","
            - !ImportValue
                Fn::Sub: "${ProjectNamespace}-PublicSubnetIds"
          SecurityGroups:
            - !ImportValue
                Fn::Sub: "${ProjectNamespace}-ECSSecurityGroupId"
      LoadBalancers:
        - ContainerName: app
          ContainerPort: 3000
          TargetGroupArn: !ImportValue
            Fn::Sub: "${ProjectNamespace}-AppTargetGroupArn"
      HealthCheckGracePeriodSeconds: 120
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 50

  # Frontend ECS Service
  WebService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${ProjectNamespace}-web-fullstack"
      Cluster: !ImportValue
        Fn::Sub: "${ProjectNamespace}-ClusterArn"
      TaskDefinition: !Ref WebTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Split
            - ","
            - !ImportValue
                Fn::Sub: "${ProjectNamespace}-PublicSubnetIds"
          SecurityGroups:
            - !ImportValue
                Fn::Sub: "${ProjectNamespace}-ECSSecurityGroupId"
      LoadBalancers:
        - ContainerName: web
          ContainerPort: 3000
          TargetGroupArn: !ImportValue
            Fn::Sub: "${ProjectNamespace}-WebTargetGroupArn"
      HealthCheckGracePeriodSeconds: 120
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 50

Outputs:
  AppServiceName:
    Value: !GetAtt AppService.Name
    Export:
      Name: !Sub "${ProjectNamespace}-AppServiceName-Fullstack"

  WebServiceName:
    Value: !GetAtt WebService.Name
    Export:
      Name: !Sub "${ProjectNamespace}-WebServiceName-Fullstack"

  ApplicationURL:
    Description: Full Stack Application URL
    Value: !Sub
      - "http://${ALBDns}"
      - ALBDns: !ImportValue
          Fn::Sub: "${ProjectNamespace}-ALBDnsName"

  BackendAPIURL:
    Description: Backend API URL
    Value: !Sub
      - "http://${ALBDns}/api"
      - ALBDns: !ImportValue
          Fn::Sub: "${ProjectNamespace}-ALBDnsName"
