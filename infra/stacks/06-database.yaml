AWSTemplateFormatVersion: '2010-09-09'
Description: DynamoDB Tables (on-demand billing)

Parameters:
  ProjectNamespace:
    Type: String
    Default: tcg-marketplace

Resources:
  GameCardLookup:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: GameCardLookup
      BillingMode: PAY_PER_REQUEST

      # primary table attributes
      AttributeDefinitions:
        - AttributeName: cardId
          AttributeType: S
        - AttributeName: cardName
          AttributeType: S

      # primary key of the table
      KeySchema:
        - AttributeName: cardId
          KeyType: HASH
        - AttributeName: cardName
          KeyType: RANGE

      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

      # server side encryption
      SSESpecification:
        SSEEnabled: true

      # dynamodb streams for triggers
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  # ──────────────────────────────────────────────
  # Messaging Platform Table
  # ──────────────────────────────────────────────
  MessagingPlatform:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: MessagingPlatform
      BillingMode: PAY_PER_REQUEST

      # primary table attributes
      AttributeDefinitions:
        - AttributeName: roomId
          AttributeType: S
        - AttributeName: messageId
          AttributeType: S
        - AttributeName: userId
          AttributeType: S
        - AttributeName: lastMessageAt
          AttributeType: N

      # primary key of the table
      KeySchema:
        - AttributeName: roomId
          KeyType: HASH
        - AttributeName: messageId
          KeyType: RANGE

      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

      # server side encryption
      SSESpecification:
        SSEEnabled: true

      # dynamodb streams for triggers
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

      # gsi
      GlobalSecondaryIndexes:
        # fetch private rooms for a user, order by lastMessageAt
        - IndexName: UserRoomsIndex
          KeySchema:
            - AttributeName: userId
              KeyType: HASH
            - AttributeName: lastMessageAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ──────────────────────────────────────────────
  # TCG Marketplace Table
  # ──────────────────────────────────────────────
  TCGMarketplace:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: TCGMarketplace
      BillingMode: PAY_PER_REQUEST

      # primary table attributes
      AttributeDefinitions:
        - AttributeName: listingId
          AttributeType: S
        - AttributeName: sellerId
          AttributeType: S
        - AttributeName: updatedAt
          AttributeType: N
        - AttributeName: gameName
          AttributeType: S

      # primary key of the table
      KeySchema:
        - AttributeName: listingId
          KeyType: HASH
        - AttributeName: updatedAt
          KeyType: RANGE

      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

      # server side encryption
      SSESpecification:
        SSEEnabled: true

      # dynamodb streams for triggers
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

      # gsi
      GlobalSecondaryIndexes:
        # seller dashboard sorted by updatedAt
        - IndexName: SellerDashboardIndex
          KeySchema:
            - AttributeName: sellerId
              KeyType: HASH
            - AttributeName: updatedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

        # game listing sorted by updatedAt
        - IndexName: GameListingIndex
          KeySchema:
            - AttributeName: gameName
              KeyType: HASH
            - AttributeName: updatedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

Outputs:
  GameCardLookupTableName:
    Description: "The name of the DynamoDB table GameCardLookup"
    Value: !Ref GameCardLookup
    Export:
      Name: !Sub "${ProjectNamespace}-GameCardLookupTableName"

  GameCardLookupTableArn:
    Description: "The ARN of the DynamoDB table GameCardLookup"
    Value: !GetAtt GameCardLookup.Arn
    Export:
      Name: !Sub "${ProjectNamespace}-GameCardLookupTableArn"

  MessagingPlatformTableName:
    Description: "The name of the DynamoDB table MessagingPlatform"
    Value: !Ref MessagingPlatform
    Export:
      Name: !Sub "${ProjectNamespace}-MessagingPlatformTableName"

  MessagingPlatformTableArn:
    Description: "The ARN of the DynamoDB table MessagingPlatform"
    Value: !GetAtt MessagingPlatform.Arn
    Export:
      Name: !Sub "${ProjectNamespace}-MessagingPlatformTableArn"

  TCGMarketplaceTableName:
    Description: "The name of the DynamoDB table TCGMarketplace"
    Value: !Ref TCGMarketplace
    Export:
      Name: !Sub "${ProjectNamespace}-TCGMarketplaceTableName"

  TCGMarketplaceTableArn:
    Description: "The ARN of the DynamoDB table TCGMarketplace"
    Value: !GetAtt TCGMarketplace.Arn
    Export:
      Name: !Sub "${ProjectNamespace}-TCGMarketplaceTableArn"
