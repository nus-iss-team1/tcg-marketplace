AWSTemplateFormatVersion: "2010-09-09"
Description: DynamoDB Tables (on-demand billing)

Parameters:
  ProjectNamespace:
    Type: String
    Default: tcg-marketplace

Resources:
  GameCardLookup:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TableName: GameCardLookup
      BillingMode: PAY_PER_REQUEST

      # primary table attributes
      AttributeDefinitions:
        - AttributeName: gameId
          AttributeType: S
        - AttributeName: meta
          AttributeType: S

      # primary key of the table
      KeySchema:
        - AttributeName: gameId
          KeyType: HASH
        - AttributeName: meta
          KeyType: RANGE

      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

      # server side encryption
      SSESpecification:
        SSEEnabled: true

      # dynamodb streams for triggers
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  # ──────────────────────────────────────────────
  # Messaging Platform Table
  # ──────────────────────────────────────────────
  MessagingPlatform:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TableName: MessagingPlatform
      BillingMode: PAY_PER_REQUEST

      # primary table attributes
      AttributeDefinitions:
        - AttributeName: entityId
          AttributeType: S
        - AttributeName: entityType
          AttributeType: S
        - AttributeName: lastMessageAt
          AttributeType: N
        - AttributeName: createdAt
          AttributeType: N

      # primary key of the table
      KeySchema:
        - AttributeName: entityId
          KeyType: HASH
        - AttributeName: entityType
          KeyType: RANGE

      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

      # server side encryption
      SSESpecification:
        SSEEnabled: true

      # dynamodb streams for triggers
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

      # gsi
      GlobalSecondaryIndexes:
        # room sorted by lastMessageAt
        - IndexName: RoomIndex
          KeySchema:
            - AttributeName: entityId
              KeyType: HASH
            - AttributeName: lastMessageAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

        # messages sorted by createdAt
        - IndexName: MessageIndex
          KeySchema:
            - AttributeName: entityId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ──────────────────────────────────────────────
  # TCG Marketplace Table
  # ──────────────────────────────────────────────
  TCGMarketplace:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TableName: TCGMarketplace
      BillingMode: PAY_PER_REQUEST

      # primary table attributes
      AttributeDefinitions:
        - AttributeName: gameName
          AttributeType: S
        - AttributeName: sellerId
          AttributeType: S
        - AttributeName: listingId
          AttributeType: S
        - AttributeName: listingUpdatedAt
          AttributeType: S
        - AttributeName: listingCardName
          AttributeType: S
        - AttributeName: listingPrice
          AttributeType: S

      # primary key of the table
      KeySchema:
        - AttributeName: gameName
          KeyType: HASH
        - AttributeName: listingId
          KeyType: RANGE

      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

      # server side encryption
      SSESpecification:
        SSEEnabled: true

      # dynamodb streams for triggers
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

      # gsi
      GlobalSecondaryIndexes:
        # seller listing sorted by updatedAt
        - IndexName: SellerListingIndex
          KeySchema:
            - AttributeName: sellerId
              KeyType: HASH
            - AttributeName: listingUpdatedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

        # listing sorted by updatedAt
        - IndexName: UpdatedListingIndex
          KeySchema:
            - AttributeName: gameName
              KeyType: HASH
            - AttributeName: listingUpdatedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

        # listing sorted by cardName
        - IndexName: CardListingIndex
          KeySchema:
            - AttributeName: gameName
              KeyType: HASH
            - AttributeName: listingCardName
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

        # listing sorted by price
        - IndexName: PriceListingIndex
          KeySchema:
            - AttributeName: gameName
              KeyType: HASH
            - AttributeName: listingPrice
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

Outputs:
  GameCardLookupTableName:
    Description: "The name of the DynamoDB table GameCardLookup"
    Value: !Ref GameCardLookup
    Export:
      Name: !Sub "${ProjectNamespace}-GameCardLookupTableName"

  GameCardLookupTableArn:
    Description: "The ARN of the DynamoDB table GameCardLookup"
    Value: !GetAtt GameCardLookup.Arn
    Export:
      Name: !Sub "${ProjectNamespace}-GameCardLookupTableArn"

  MessagingPlatformTableName:
    Description: "The name of the DynamoDB table MessagingPlatform"
    Value: !Ref MessagingPlatform
    Export:
      Name: !Sub "${ProjectNamespace}-MessagingPlatformTableName"

  MessagingPlatformTableArn:
    Description: "The ARN of the DynamoDB table MessagingPlatform"
    Value: !GetAtt MessagingPlatform.Arn
    Export:
      Name: !Sub "${ProjectNamespace}-MessagingPlatformTableArn"

  TCGMarketplaceTableName:
    Description: "The name of the DynamoDB table TCGMarketplace"
    Value: !Ref TCGMarketplace
    Export:
      Name: !Sub "${ProjectNamespace}-TCGMarketplaceTableName"

  TCGMarketplaceTableArn:
    Description: "The ARN of the DynamoDB table TCGMarketplace"
    Value: !GetAtt TCGMarketplace.Arn
    Export:
      Name: !Sub "${ProjectNamespace}-TCGMarketplaceTableArn"
