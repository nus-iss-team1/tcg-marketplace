AWSTemplateFormatVersion: '2010-09-09'
Description: OIDC and Dual ECR Repositories for Monorepo (App and Web)

Parameters:
  GitHubOrg:
    Type: String
    Description: Your GitHub Organization or Username
  GitHubRepo:
    Type: String
    Description: Your GitHub Repository Name
  ProjectNamespace:
    Type: String
    Default: tcg-marketplace
    Description: The prefix for your repositories (e.g., tcg-marketplace)

Resources:
  # 1. Identity Provider for GitHub
  GithubOidc:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList: [sts.amazonaws.com]
      ThumbprintList: [6938fd4d98bab03faadb97b34396831e3780aea1]

  # 2. Repository for the App Image
  AppRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "${ProjectNamespace}/tcgm-app"
      LifecyclePolicy:
        LifecyclePolicyText: |
          {"rules":[{"rulePriority":1,"description":"Keep last 10","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":10},"action":{"type":"expire"}}]}

  # 3. Repository for the Web Image
  WebRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "${ProjectNamespace}/tcgm-web"
      LifecyclePolicy:
        LifecyclePolicyText: |
          {"rules":[{"rulePriority":1,"description":"Keep last 10","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":10},"action":{"type":"expire"}}]}

  # 4. IAM Role with Wildcard Permissions for the Namespace
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${GitHubRepo}-monorepo-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17 "
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GithubOidcs
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:*"
      Policies:
        - PolicyName: ECRMonorepoPushPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                Resource: !Sub "arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/${ProjectNamespace}/*"
        - PolicyName: ECSDeployPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecs:UpdateService
                  - ecs:DescribeServices
                  - ecs:DescribeTaskDefinition
                  - ecs:RegisterTaskDefinition
                Resource: "*"
              - Effect: Allow
                Action: iam:PassRole
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/${ProjectNamespace}-ecs-*"

Outputs:
  RoleArn:
    Value: !GetAtt GitHubActionsRole.Arn
  AppRepoUri:
    Value: !GetAtt AppRepository.RepositoryUri
  WebRepoUri:
    Value: !GetAtt WebRepository.RepositoryUri