AWSTemplateFormatVersion: '2010-09-09'
Description: "VPC, Subnets, NAT Gateway, ECS Cluster, Internal ALB, API Gateway"

Parameters:
  ProjectNamespace:
    Type: String
    Default: nusiss-team-1-voc
  Environment:
    Type: String
    Default: ""
    Description: "Environment prefix (e.g. prod). Leave empty for dev."
  DomainName:
    Type: String
    Default: ""
    Description: "Custom domain (e.g. vaultofcards.io or dev.vaultofcards.io). Leave empty to skip."
  HostedZoneId:
    Type: String
    Default: ""
    Description: "Existing Route 53 Hosted Zone ID. Required when DomainName is set."

Conditions:
  HasEnvPrefix: !Not [!Equals [!Ref Environment, ""]]
  HasDomain: !Not [!Equals [!Ref DomainName, ""]]

Resources:

  # ════════════════════════════════════════════════════════════
  # Networking
  # ════════════════════════════════════════════════════════════

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !If
            - HasEnvPrefix
            - !Sub "${ProjectNamespace}-${Environment}-vpc"
            - !Sub "${ProjectNamespace}-vpc"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !If
            - HasEnvPrefix
            - !Sub "${ProjectNamespace}-${Environment}-igw"
            - !Sub "${ProjectNamespace}-igw"

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # ── Public Subnets ─────────────────────────────────────────
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !If
            - HasEnvPrefix
            - !Sub "${ProjectNamespace}-${Environment}-public-rt"
            - !Sub "${ProjectNamespace}-public-rt"

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !If
            - HasEnvPrefix
            - !Sub "${ProjectNamespace}-${Environment}-public-a"
            - !Sub "${ProjectNamespace}-public-a"

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !If
            - HasEnvPrefix
            - !Sub "${ProjectNamespace}-${Environment}-public-b"
            - !Sub "${ProjectNamespace}-public-b"

  SubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  SubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  # ── NAT Gateways (one per AZ) ──────────────────────────────
  NATGatewayEIPA:
    Type: AWS::EC2::EIP
    DependsOn: VPCGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !If
            - HasEnvPrefix
            - !Sub "${ProjectNamespace}-${Environment}-nat-eip-a"
            - !Sub "${ProjectNamespace}-nat-eip-a"

  NATGatewayA:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NATGatewayEIPA.AllocationId
      SubnetId: !Ref PublicSubnetA
      Tags:
        - Key: Name
          Value: !If
            - HasEnvPrefix
            - !Sub "${ProjectNamespace}-${Environment}-nat-a"
            - !Sub "${ProjectNamespace}-nat-a"

  NATGatewayEIPB:
    Type: AWS::EC2::EIP
    DependsOn: VPCGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !If
            - HasEnvPrefix
            - !Sub "${ProjectNamespace}-${Environment}-nat-eip-b"
            - !Sub "${ProjectNamespace}-nat-eip-b"

  NATGatewayB:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NATGatewayEIPB.AllocationId
      SubnetId: !Ref PublicSubnetB
      Tags:
        - Key: Name
          Value: !If
            - HasEnvPrefix
            - !Sub "${ProjectNamespace}-${Environment}-nat-b"
            - !Sub "${ProjectNamespace}-nat-b"

  # ── Private Subnets ────────────────────────────────────────
  PrivateRouteTableA:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !If
            - HasEnvPrefix
            - !Sub "${ProjectNamespace}-${Environment}-private-rt-a"
            - !Sub "${ProjectNamespace}-private-rt-a"

  PrivateRouteA:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableA
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NATGatewayA

  PrivateRouteTableB:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !If
            - HasEnvPrefix
            - !Sub "${ProjectNamespace}-${Environment}-private-rt-b"
            - !Sub "${ProjectNamespace}-private-rt-b"

  PrivateRouteB:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableB
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NATGatewayB

  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !If
            - HasEnvPrefix
            - !Sub "${ProjectNamespace}-${Environment}-private-a"
            - !Sub "${ProjectNamespace}-private-a"

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.4.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !If
            - HasEnvPrefix
            - !Sub "${ProjectNamespace}-${Environment}-private-b"
            - !Sub "${ProjectNamespace}-private-b"

  PrivateSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetA
      RouteTableId: !Ref PrivateRouteTableA

  PrivateSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetB
      RouteTableId: !Ref PrivateRouteTableB

  # ════════════════════════════════════════════════════════════
  # Cluster, ALB, API Gateway
  # ════════════════════════════════════════════════════════════

  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-cluster"
        - !Sub "${ProjectNamespace}-cluster"

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow inbound HTTP from VPC (API Gateway via VPC Link)
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 10.0.0.0/16
      Tags:
        - Key: Name
          Value: !If
            - HasEnvPrefix
            - !Sub "${ProjectNamespace}-${Environment}-alb-sg"
            - !Sub "${ProjectNamespace}-alb-sg"

  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow inbound from ALB only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 0
          ToPort: 65535
          SourceSecurityGroupId: !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: !If
            - HasEnvPrefix
            - !Sub "${ProjectNamespace}-${Environment}-ecs-sg"
            - !Sub "${ProjectNamespace}-ecs-sg"

  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-alb"
        - !Sub "${ProjectNamespace}-alb"
      Scheme: internal
      Type: application
      Subnets:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
      SecurityGroups:
        - !Ref ALBSecurityGroup
      LoadBalancerAttributes:
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: "true"
      Tags:
        - Key: Name
          Value: !If
            - HasEnvPrefix
            - !Sub "${ProjectNamespace}-${Environment}-alb"
            - !Sub "${ProjectNamespace}-alb"

  AppTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-app-tg"
        - !Sub "${ProjectNamespace}-app-tg"
      Port: 3001
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: ip
      HealthCheckPath: /api/health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  WebTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-web-tg"
        - !Sub "${ProjectNamespace}-web-tg"
      Port: 3000
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: ip
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref WebTargetGroup

  APIListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref ALBListener
      Priority: 1
      Conditions:
        - Field: path-pattern
          Values:
            - "/api/*"
      Actions:
        - Type: forward
          TargetGroupArn: !Ref AppTargetGroup

  # ── API Gateway (HTTP API) with VPC Link ───────────────────
  VpcLink:
    Type: AWS::ApiGatewayV2::VpcLink
    Properties:
      Name: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-vpc-link"
        - !Sub "${ProjectNamespace}-vpc-link"
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
      SecurityGroupIds:
        - !Ref ALBSecurityGroup

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-api"
        - !Sub "${ProjectNamespace}-api"
      ProtocolType: HTTP

  HttpApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: HTTP_PROXY
      IntegrationUri: !GetAtt ALBListener.ListenerArn
      IntegrationMethod: ANY
      ConnectionType: VPC_LINK
      ConnectionId: !Ref VpcLink
      PayloadFormatVersion: "1.0"

  HttpApiDefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "$default"
      Target: !Sub "integrations/${HttpApiIntegration}"

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: "$default"
      AutoDeploy: true

  # ── Custom Domain (conditional) ────────────────────────────
  ACMCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: HasDomain
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId

  ApiCustomDomain:
    Type: AWS::ApiGatewayV2::DomainName
    Condition: HasDomain
    Properties:
      DomainName: !Ref DomainName
      DomainNameConfigurations:
        - EndpointType: REGIONAL
          CertificateArn: !Ref ACMCertificate

  ApiDomainMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Condition: HasDomain
    Properties:
      ApiId: !Ref HttpApi
      DomainName: !Ref ApiCustomDomain
      Stage: !Ref HttpApiStage

  DnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApiCustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt ApiCustomDomain.RegionalHostedZoneId

Outputs:
  # Networking
  VpcId:
    Value: !Ref VPC
    Export:
      Name: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-VpcId"
        - !Sub "${ProjectNamespace}-VpcId"
  PublicSubnetIds:
    Value: !Join [",", [!Ref PublicSubnetA, !Ref PublicSubnetB]]
    Export:
      Name: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-PublicSubnetIds"
        - !Sub "${ProjectNamespace}-PublicSubnetIds"
  PrivateSubnetIds:
    Value: !Join [",", [!Ref PrivateSubnetA, !Ref PrivateSubnetB]]
    Export:
      Name: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-PrivateSubnetIds"
        - !Sub "${ProjectNamespace}-PrivateSubnetIds"

  # Cluster & API Gateway
  ClusterArn:
    Value: !GetAtt ECSCluster.Arn
    Export:
      Name: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-ClusterArn"
        - !Sub "${ProjectNamespace}-ClusterArn"
  ClusterName:
    Value: !Ref ECSCluster
    Export:
      Name: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-ClusterName"
        - !Sub "${ProjectNamespace}-ClusterName"
  ALBDnsName:
    Value: !GetAtt ALB.DNSName
    Export:
      Name: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-ALBDnsName"
        - !Sub "${ProjectNamespace}-ALBDnsName"
  ApiGatewayUrl:
    Value: !GetAtt HttpApi.ApiEndpoint
    Export:
      Name: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-ApiGatewayUrl"
        - !Sub "${ProjectNamespace}-ApiGatewayUrl"
  AppTargetGroupArn:
    Value: !Ref AppTargetGroup
    Export:
      Name: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-AppTargetGroupArn"
        - !Sub "${ProjectNamespace}-AppTargetGroupArn"
  WebTargetGroupArn:
    Value: !Ref WebTargetGroup
    Export:
      Name: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-WebTargetGroupArn"
        - !Sub "${ProjectNamespace}-WebTargetGroupArn"
  ECSSecurityGroupId:
    Value: !Ref ECSSecurityGroup
    Export:
      Name: !If
        - HasEnvPrefix
        - !Sub "${ProjectNamespace}-${Environment}-ECSSecurityGroupId"
        - !Sub "${ProjectNamespace}-ECSSecurityGroupId"
